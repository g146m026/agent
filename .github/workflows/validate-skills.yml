name: Validate Skills & Prompts

on:
  push:
    paths:
      - 'skills/**'
      - 'prompts/**'
      - 'agent-instructions.md'
      - 'AGENTS.md'
      - 'tests/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'prompts/**'
      - 'agent-instructions.md'
      - 'AGENTS.md'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        run: |
          sudo apt-get install -y markdownlint-cli || true
          markdownlint skills/*.md prompts/*.md agent-instructions.md AGENTS.md || true
      - name: Check YAML validity
        run: |
          sudo apt-get install -y yamllint || true
          yamllint skills/*.yaml || true
      - name: Run tests (pytest for agent)
        run: |
          sudo apt-get update -y && sudo apt-get install -y python3 python3-pip || true
          pip3 install pytest pyyaml || true
          pytest -q agent/tests/qa || true
