name: Validate Skills & Prompts

on:
  push:
    paths:
      - 'skills/**'
      - 'prompts/**'
      - 'agent-instructions.md'
      - 'AGENTS.md'
      - 'tests/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'prompts/**'
      - 'agent-instructions.md'
      - 'AGENTS.md'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        run: |
          sudo apt-get install -y markdownlint-cli || true
          markdownlint skills/*.md prompts/*.md agent-instructions.md AGENTS.md || true
      - name: Check YAML validity
        run: |
          sudo apt-get install -y yamllint || true
          yamllint skills/*.yaml || true
      - name: Run tests (placeholder)
        run: |
          echo "Add your test runner here (pytest, npm test, etc.)"
